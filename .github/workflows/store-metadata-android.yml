name: Update Android Store Listing

on:
  push:
    branches: [master]
    paths:
      - 'fastlane/metadata/android/**'
  workflow_dispatch:

env:
  FASTLANE_SKIP_DOCS: '1'
  FASTLANE_OPT_OUT_USAGE: '1'

jobs:
  push-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Check if images changed
        id: images
        run: |
          if git diff --name-only HEAD~1 HEAD -- 'fastlane/metadata/android/**/images/**' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - run: bundle exec fastlane android metadata
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.PLAY_STORE_KEY_JSON }}
          SKIP_IMAGES: ${{ steps.images.outputs.changed == 'false' && 'true' || 'false' }}
